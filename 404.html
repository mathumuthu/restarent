<section class="estate-404">

<div class="error-content" data-aos="zoom-in">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>The property you are looking for might have been removed or temporarily unavailable.</p>

<a href="index.html" class="home-btn">Go Back Home</a>

</div>

</section>
<style>.estate-404{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#2ea89b,#1e6dfb);
text-align:center;
color:#fff;
padding:20px;
}

.error-content h1{
font-size:120px;
margin-bottom:10px;
}

.error-content h2{
margin-bottom:10px;
}

.home-btn{
display:inline-block;
margin-top:20px;
padding:10px 25px;
background:#fff;
color:#000;
text-decoration:none;
border-radius:5px;
transition:.3s;
}

.home-btn:hover{
background:#000;
color:#fff;
}

@media(max-width:768px){

.error-content h1{
font-size:80px;
}

}</style>
<script>

// GSAP ENTRY ANIMATION

gsap.from(".error-content",{
scale:0,
duration:1
});

// BUTTON HOVER ANIMATION

document.querySelector(".home-btn").addEventListener("mouseenter",()=>{
gsap.to(".home-btn",{scale:1.1,duration:0.3});
});

document.querySelector(".home-btn").addEventListener("mouseleave",()=>{
gsap.to(".home-btn",{scale:1,duration:0.3});
});

</script></script>

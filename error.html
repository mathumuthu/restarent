<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
color:#fff;
text-align:center;
padding:20px;
}

/* container */

.error-container{
max-width:600px;
}

/* 404 text */

.error-number{
font-size:140px;
font-weight:700;
color:#f59e0b;
letter-spacing:5px;
animation:float 3s infinite ease-in-out;
}

/* animation */

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.error-title{
font-size:32px;
margin-bottom:10px;
}

.error-text{
font-size:16px;
color:#cbd5f5;
margin-bottom:30px;
}

/* button */

.home-btn{
display:inline-block;
padding:14px 30px;
background:#f59e0b;
color:#000;
text-decoration:none;
font-weight:600;
border-radius:40px;
transition:0.3s;
}

.home-btn:hover{
background:#fff;
}

/* responsive */

@media(max-width:600px){

.error-number{
font-size:90px;
}

.error-title{
font-size:24px;
}

}

</style>

</head>

<body>


<div class="error-container">

<div class="error-number">404</div>

<h1 class="error-title">Oops! Page Not Found</h1>

<p class="error-text">
The page you are looking for might have been removed or doesn't exist.
</p>

<a href="homepage2.html" class="home-btn">Back To Home</a>

</div>


</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Restaurant - Sign Up</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0a2a2f;
color:#fff;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.signup-container{
width:100%;
max-width:420px;
padding:40px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(201,184,150,0.3);
border-radius:10px;
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:25px;
font-family:'Cormorant Garamond',serif;
font-size:28px;
letter-spacing:2px;
color:#c9b896;
}

.signup-container h2{
text-align:center;
margin-bottom:25px;
font-weight:400;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
font-size:13px;
color:#c9b896;
display:block;
margin-bottom:6px;
}

.form-group input{
width:100%;
padding:12px;
background:transparent;
border:1px solid rgba(201,184,150,0.4);
color:#fff;
border-radius:4px;
outline:none;
}

.form-group input:focus{
border-color:#c9b896;
}

.signup-btn{
width:100%;
padding:14px;
background:#c9b896;
border:none;
color:#0a2a2f;
font-weight:600;
letter-spacing:1px;
cursor:pointer;
margin-top:10px;
border-radius:4px;
transition:.3s;
}

.signup-btn:hover{
background:#b6a27c;
}

.login-text{
text-align:center;
margin-top:18px;
font-size:14px;
}

.login-text a{
color:#c9b896;
text-decoration:none;
}

.login-text a:hover{
text-decoration:underline;
}

@media(max-width:480px){

.signup-container{
margin:20px;
padding:30px 20px;
}

}

</style>
</head>

<body>

<div class="signup-container">

<div class="logo">
<img src="logo.webp" width="50" height="50" alt="logo">
<span>STACKLY</span>
</div>

<h2>Create Account</h2>

<form id="signupForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="John Doe" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="john@email.com" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" placeholder="+91 9876543210" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="Enter password" required>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>
</div>

<button class="signup-btn">Create Account</button>

</form>

<div class="login-text">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

<script>

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Account created successfully!");

window.location.href="404.html";

});

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Restaurant - Forgot Password</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0a2a2f;
color:#fff;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.forgot-container{
width:100%;
max-width:420px;
padding:40px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(201,184,150,0.3);
border-radius:10px;
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:25px;
font-family:'Cormorant Garamond',serif;
font-size:28px;
letter-spacing:2px;
color:#c9b896;
}
.forgot-container h2{
text-align:center;
margin-bottom:15px;
font-weight:400;
}

.description{
text-align:center;
font-size:14px;
color:#ccc;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
font-size:13px;
color:#c9b896;
display:block;
margin-bottom:6px;
}

.form-group input{
width:100%;
padding:12px;
background:transparent;
border:1px solid rgba(201,184,150,0.4);
color:#fff;
border-radius:4px;
outline:none;
}

.form-group input:focus{
border-color:#c9b896;
}

.reset-btn{
width:100%;
padding:14px;
background:#c9b896;
border:none;
color:#0a2a2f;
font-weight:600;
letter-spacing:1px;
cursor:pointer;
border-radius:4px;
transition:.3s;
}

.reset-btn:hover{
background:#b6a27c;
}

.back-login{
text-align:center;
margin-top:20px;
font-size:14px;
}

.back-login a{
color:#c9b896;
text-decoration:none;
}

.back-login a:hover{
text-decoration:underline;
}

@media(max-width:480px){

.forgot-container{
margin:20px;
padding:30px 20px;
}

}

</style>
</head>

<body>

<div class="forgot-container">

<div class="logo">
<img src="logo.webp" width="50" height="50" alt="logo">
<span>STACKLY</span>
</div>
<h2>Forgot Password</h2>

<p class="description">
Enter your email and we will send a password reset link.
</p>

<form id="resetForm">

<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<button class="reset-btn">Send Reset Link</button>

</form>

<div class="back-login">
<a href="login.html">Back to Login</a>
</div>

</div>

<script>

document.getElementById("resetForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Password reset link sent to your email!");
window.location.href="404.html";


});

</script>

</body>
</html>
